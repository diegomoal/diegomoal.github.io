<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página com Bootstrap</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQh58iYREKZwG1yHyiHyVLQDXVMdZNFNHQjR8pZPQ64Z559wAo28GL+CA" crossorigin="anonymous">
    
    <style>
        body {
            /* Definir a imagem de fundo */
            background-image: url("bg.jpeg");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            
            /* Ajustar o tamanho da fonte para dispositivos móveis */
            font-size: 16px;
        }
        
        .container {
            /* Adicionar um pouco de espaçamento ao conteúdo */
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Título da sua página</h1>
        
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Maecenas sit amet pretium urna. Nulla facilisi. Fusce eget risus eget orci tincidunt ultricies. Donec eget lacus eget felis ultricies ultricies.</p>
        
        <button type="button" class="btn btn-primary">Clique aqui</button>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1DIVuza5q0r/0mAOy3z7ZaVp15qCyzXGIyCO+qYGxE53F571/m+2Q3n3685g" crossorigin="anonymous"></script>
</body>
</html>
